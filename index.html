<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title></title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <input id="fileInput" type="file" accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" style="display:none" />
  <label for="fileInput">ladda upp fil</label>

  <script>
(function () {
  var ONE_DAY_FMT = '"1d"\\ hh:mm';
  var RE_1D = /^1d\s+(\d{1,2}):(\d{2})$/i;

  function oneDayStringToSerial(s) {
    if (!s || typeof s !== 'string') return null;
    var m = String(s).trim().match(RE_1D);
    if (!m) return null;
    var h = parseInt(m[1], 10);
    var min = parseInt(m[2], 10);
    return 1 + (h * 60 + min) / (24 * 60);
  }

  /**
   * @param {*} value cell value (SheetJS parsed)
   * @param {*} cell optional cell ref for fallback string from formatted text
   */
  function parseTimeToMinutes(value, cell) {
    if (value === null || value === undefined || value === '') return null;

    if (typeof value === 'string') {
      var sm = String(value).trim().match(RE_1D);
      if (sm) {
        var h1 = parseInt(sm[1], 10);
        var m1 = parseInt(sm[2], 10);
        return 24 * 60 + h1 * 60 + m1;
      }
      var hm = String(value).trim().match(/^(\d{1,2}):(\d{2})$/);
      if (hm) return parseInt(hm[1], 10) * 60 + parseInt(hm[2], 10);
      return null;
    }

    if (typeof value === 'number') {
      if (!isFinite(value)) return null;
      return Math.round(value * 24 * 60);
    }

    if (value instanceof Date && !isNaN(value.getTime())) {
      var epoch = Date.UTC(1899, 11, 30);
      var days = Math.floor((value.getTime() - epoch) / 86400000);
      if (days < 0) days = 0;
      return days * 24 * 60 + value.getUTCHours() * 60 + value.getUTCMinutes();
    }

    if (cell && typeof cell.w === 'string') {
      return parseTimeToMinutes(cell.w, null);
    }

    return null;
  }

  function normalizeTrainNo(v) {
    if (v === null || v === undefined) return '';
    if (typeof v === 'number' && isFinite(v)) {
      if (Math.floor(v) === v) return String(Math.trunc(v));
      var s = String(v);
      if (/\.0+$/.test(s)) return String(Math.trunc(v));
      return s.replace(/\.0+$/, '');
    }
    var t = String(v).trim();
    return t;
  }

  function triggerDownload(blob, filename) {
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.rel = 'noopener';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(a.href); }, 0);
  }

  function processWorkbook(wb) {
    if (!wb.SheetNames.length) return false;
    var sheetName = wb.SheetNames[0];
    var ws = wb.Sheets[sheetName];
    var ref = ws['!ref'];
    if (!ref) return false;
    var rng = XLSX.utils.decode_range(ref);
    if (rng.e.r < 1) return false;

    var headerRow = 0;
    var colIndex = {};

    function getHeaderVal(c) {
      var addr = XLSX.utils.encode_cell({ r: headerRow, c: c });
      var cell = ws[addr];
      if (!cell) return '';
      if (typeof cell.v === 'string') return cell.v.trim();
      if (cell.v != null && cell.v !== '') return String(cell.v).trim();
      if (typeof cell.w === 'string') return cell.w.trim();
      return '';
    }

    var c;
    for (c = rng.s.c; c <= rng.e.c; c++) {
      var h = getHeaderVal(c);
      if (h && colIndex[h] === undefined) colIndex[h] = c;
    }

    var colTåg = colIndex['Tåg'];
    var colAnkomst = colIndex['Ankomsttid'];
    var colAvgång = colIndex['Avgångstid'];
    var colNytt = colIndex['Nytt tågnummer'];

    if (colTåg === undefined || colAnkomst === undefined || colAvgång === undefined || colNytt === undefined) {
      return false;
    }

    var r;
    for (r = headerRow + 1; r <= rng.e.r; r++) {
      var addrG = XLSX.utils.encode_cell({ r: r, c: colAvgång });
      var cellG = ws[addrG];
      var gVal = cellG ? cellG.v : undefined;
      if (typeof gVal === 'string' && RE_1D.test(gVal.trim())) {
        var ser = oneDayStringToSerial(gVal);
        if (ser != null) {
          ws[addrG] = { t: 'n', v: ser, z: ONE_DAY_FMT };
          cellG = ws[addrG];
          gVal = ser;
        }
      }

      var addrE = XLSX.utils.encode_cell({ r: r, c: colAnkomst });
      var cellE = ws[addrE];
      var eVal = cellE ? cellE.v : undefined;
      if (typeof eVal === 'string' && RE_1D.test(String(eVal).trim())) {
        var serE = oneDayStringToSerial(eVal);
        if (serE != null) {
          ws[addrE] = { t: 'n', v: serE, z: ONE_DAY_FMT };
          cellE = ws[addrE];
          eVal = serE;
        }
      }

      var arrMin = parseTimeToMinutes(eVal, cellE);
      var depMin = parseTimeToMinutes(gVal, cellG);

      var addrTrain = XLSX.utils.encode_cell({ r: r, c: colTåg });
      var cellTrain = ws[addrTrain];
      var trainRaw = cellTrain ? cellTrain.v : null;
      var trainNo = normalizeTrainNo(trainRaw);

      var gapHours = arrMin !== null && depMin !== null ? (depMin - arrMin) / 60 : null;

      if (gapHours !== null && gapHours >= 6 && trainNo !== '') {
        var addrI = XLSX.utils.encode_cell({ r: r, c: colNytt });
        ws[addrI] = { t: 'str', v: 'v' + trainNo };
      }
    }

    return true;
  }

  function baseName(fname) {
    var i = fname.lastIndexOf('.');
    if (i === -1) return fname + '-processed';
    return fname.slice(0, i) + '-processed' + fname.slice(i);
  }

  document.getElementById('fileInput').addEventListener('change', function (ev) {
    var file = ev.target.files && ev.target.files[0];
    ev.target.value = '';
    if (!file) return;

    var name = file.name || 'workbook.xlsx';
    var lower = name.toLowerCase();
    if (!(lower.endsWith('.xlsx') || file.type === 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet')) {
      return;
    }

    var reader = new FileReader();
    reader.onload = function () {
      var data = reader.result;
      try {
        var wb = XLSX.read(data, { type: 'array', cellDates: false });
        var ok = processWorkbook(wb);
        if (!ok) return;
        var out = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
        var blob = new Blob([out], {
          type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
        });
        triggerDownload(blob, baseName(name));
      } catch (e) {
        return;
      }
    };
    reader.readAsArrayBuffer(file);
  });
})();
  </script>
</body>
</html>
